services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: hm-backend
    restart: unless-stopped
    environment:
      - CORS_ORIGINS=${CORS_ORIGINS:-}
    volumes:
      # 数据持久化：数据库 + 上传文件
      - ./data:/app/data
      # 配置文件挂载（修改后无需重新构建镜像）
      - ./backend/config.yaml:/app/backend/config.yaml:ro
    ports:
      - "127.0.0.1:8000:8000"  # 只绑定本地，由 Nginx 代理
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: hm-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Nginx 配置（可运行时替换）
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # SSL 证书目录（Let's Encrypt）
      - ./data/certbot/conf:/etc/letsencrypt:ro
      - ./data/certbot/www:/var/www/certbot:ro
    depends_on:
      backend:
        condition: service_healthy

  # SSL 证书申请（仅初始化时使用，平时注释掉）
  # certbot:
  #   image: certbot/certbot:latest
  #   volumes:
  #     - ./data/certbot/conf:/etc/letsencrypt
  #     - ./data/certbot/www:/var/www/certbot
  #   command: certonly --webroot -w /var/www/certbot
  #     -d ${DOMAIN} --email ${EMAIL} --agree-tos --no-eff-email

networks:
  default:
    name: hm-network
